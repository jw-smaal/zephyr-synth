CONFIG_I2S_HAS_PLL_SETTING=n

# Fix for a bug with the watchdog in v4.4.0 
# we need to enable the watchdog in the Kconfig
# but disable it right away at boot.
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=y


